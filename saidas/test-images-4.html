<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Teste de Imagens 4</title>
  <style>
    body { font-family: sans-serif; background: #faf6ee; padding: 20px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
    .card { background: #fff; border: 1px solid #e2dacb; border-radius: 12px; padding: 15px; text-align: center; }
    img { width: 100%; height: 250px; object-fit: cover; border-radius: 8px; }
    .label { margin-top: 10px; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Teste de Imagens Unsplash - Lote 4</h1>
  <div class="grid">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1507048331197-7d4ac70811cf?w=600&fit=crop">
      <div class="label">Chef Cooking Wok Fire (photo-1507048331197-7d4ac70811cf)</div>
    </div>
    <div class="card">
      <img src="https://images.unsplash.com/photo-1556910103-1c02745aae4d?w=600&fit=crop">
      <div class="label">Kitchen Cooking Pan (photo-1556910103-1c02745aae4d)</div>
    </div>
    <div class="card">
      <img src="https://images.unsplash.com/photo-1541614101331-1a5a3a194e92?w=600&fit=crop">
      <div class="label">Chef Plating Cooking (photo-1541614101331-1a5a3a194e92)</div>
    </div>
  </div>
</body>
</html>
