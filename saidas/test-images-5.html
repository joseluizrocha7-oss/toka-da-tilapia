<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Teste de Imagens 5</title>
  <style>
    body { font-family: sans-serif; background: #faf6ee; padding: 20px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
    .card { background: #fff; border: 1px solid #e2dacb; border-radius: 12px; padding: 15px; text-align: center; }
    img { width: 100%; height: 250px; object-fit: cover; border-radius: 8px; }
    .label { margin-top: 10px; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Teste de Imagens Unsplash - Lote 5</h1>
  <div class="grid">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1514326640560-7d063ef2aed5?w=600&fit=crop">
      <div class="label">5A (photo-1514326640560-7d063ef2aed5)</div>
    </div>
    <div class="card">
      <img src="https://images.unsplash.com/photo-1551218808-94e220e084d2?w=600&fit=crop">
      <div class="label">5B (photo-1551218808-94e220e084d2)</div>
    </div>
    <div class="card">
      <img src="https://images.unsplash.com/photo-1579631542720-3a87824ffd8e?w=600&fit=crop">
      <div class="label">5C (photo-1579631542720-3a87824ffd8e)</div>
    </div>
    <div class="card">
      <img src="https://images.unsplash.com/photo-1519708227418-c8fd9a32b7a2?w=600&fit=crop">
      <div class="label">5D (photo-1519708227418-c8fd9a32b7a2)</div>
    </div>
    <div class="card">
      <img src="https://images.unsplash.com/photo-1544833008-72f556734b27?w=600&fit=crop">
      <div class="label">5E (photo-1544833008-72f556734b27)</div>
    </div>
  </div>
</body>
</html>
